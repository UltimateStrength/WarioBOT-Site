<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Início — WarioBOT</title>
  <link href="css/style.css" rel="stylesheet" />
</head>
<body>

  <header>
    <div class="center">
      <div class="logo">
        <img src="assets/logo.png" alt="WarioBOT logo" />
      </div>
      <nav class="menu">
        <a href="#">Início</a>
        <a href="#">Premium</a>
        <a href="#">Comandos</a>
        <a href="#">Suporte</a>
        <a href="#">Sobre</a>
      </nav>
    </div>
  </header>

  <section class="hero">
    <div class="hero-bg"></div>
    <div class="hero-content">
      <div class="extras">
        <img src="assets/img1.png" alt="WarioBOT ilustração" />
        <div class="addbot">
          <a href="https://discord.com/oauth2/authorize?client_id=709448420548673536&scope=bot&permissions=2080374975" target="_blank" rel="noopener noreferrer">
            <img src="assets/Capturar.png" alt="Adicionar bot" />

        </div>
        <div class="commands">
          <a href="https://wariobot.webnode.page/commands/">
            <img src="assets/g.png" alt="Comandos" />
          </a>
        </div>
        <div class="more">
          <a href="https://wariobot.webnode.page/about/">
            <img src="assets/sdf.png" alt="Sobre" />
          </a>
        </div>
      </div>

      <div class="centro">
        <div class="texto-sobre">
          <h1><span style="color:#27210d">Prazer Wario!!!</span></h1>
          <p><span style="color:#676136">O Bot que Fará seu Servidor Incrível!!!</span></p>
        </div>
      </div>
    </div>
  </section>

</html>
